
<div class="card border-0 shadow-sm">

<div class="card-body">

<h6 class="fw-bold text-danger mb-3">
<i class="bi bi-clock-history"></i> Status History
</h6>

{% for s in lead.status_history.all %}

<div class="mb-2">

<small>

<strong>{{ s.old_status|capfirst }}</strong>
→
<strong>{{ s.new_status|capfirst }}</strong>

<br>

{{ s.changed_by.username }}
•
{{ s.changed_at|date:"d M Y H:i" }}

</small>

</div>

{% empty %}

<p class="text-muted">No status changes recorded</p>

{% endfor %}

</div>

</div>
