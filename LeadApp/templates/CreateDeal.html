{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LeadCRM | Create Deal</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{% static 'css/adminlte.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body class="layout-fixed sidebar-expand-lg sidebar-open bg-body-tertiary">

<div class="app-wrapper">
  {% include 'navbar.html' %}
  {% include 'sidebar.html' %}

<main class="app-main">

<div class="app-content-header">
  <div class="container-fluid">
    <div class="row">
      <div class="col-sm-6">
        <h3 class="mb-0">Create Deal</h3>
      </div>
      <div class="col-sm-6">
        <ol class="breadcrumb float-sm-end">
          <li class="breadcrumb-item">
            <a href="{% url 'dashboard' %}" style="color:black">Dashboard</a>
          </li>
          <li class="breadcrumb-item active">Create Deal</li>
        </ol>
      </div>
    </div>
  </div>
</div>

<div class="app-content">
<div class="container-fluid">

<div class="card card-success card-outline">

  <div class="card-header">
    <h5 class="card-title">
      <i class="bi bi-cash-stack"></i>
      Deal for {{ lead.full_name }}
    </h5>
  </div>
<form method="POST">
{% csrf_token %}

<div class="card-body">

<h5 class="mb-3">Lead: {{ lead.full_name }}</h5>

<!-- Lead Budget (Read Only) -->
<div class="mb-3">
  <label class="form-label">Lead Budget</label>
  <input type="number"
         class="form-control"
         value="{{ lead.budget }}"
         disabled>
</div>

<!-- Deal Value -->
<div class="mb-3">
  <label class="form-label">Deal Value *</label>
  <input type="number"
         step="0.01"
         name="deal_value"
         class="form-control"
         value="{% if deal %}{{ deal.deal_value }}{% endif %}"
         required>
</div>

<!-- Closing Date -->
<div class="mb-3">
  <label class="form-label">Closing Date *</label>
  <input type="date"
         name="closing_date"
         class="form-control"
         value="{% if deal %}{{ deal.closing_date|date:'Y-m-d' }}{% endif %}"
         required>
</div>

<!-- Notes -->
<div class="mb-3">
  <label class="form-label">Notes</label>
  <textarea name="notes"
            class="form-control"
            rows="3">{% if deal %}{{ deal.notes }}{% endif %}</textarea>
</div>

</div>

<div class="card-footer text-end">
  <button type="submit" class="btn btn-success">
    {% if deal %}Update Deal{% else %}Create Deal{% endif %}
  </button>
</div>

</form>

</div>

</div>
</div>

</main>

{% include 'footer.html' %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/adminlte.js' %}"></script>

<script>
  const paymentStatus = document.getElementById("payment_status");
  const paymentDateSection = document.getElementById("payment_date_section");

  paymentStatus.addEventListener("change", function() {
    if (this.value === "paid") {
      paymentDateSection.style.display = "block";
    } else {
      paymentDateSection.style.display = "none";
    }
  });
</script>

</body>
</html>
