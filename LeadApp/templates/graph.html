<div class="container-fluid mt-4">
  <form method="get" class="mb-3">
    <div class="row">
      <div class="col-md-3">
        <select name="month" class="form-select" onchange="this.form.submit()">
          <option value="">Current Month</option>

          {% for m, name in months_list %}

          <option
            value="{{ m }}"
            {%
            if
            selected_month=""
            ="m"
            %}selected{%
            endif
            %}
          >
            {{ name }}
          </option>

          {% endfor %}
        </select>
      </div>
    </div>
  </form>
  <div class="row g-4 mb-4">
    <!-- TODAY -->
    <div class="col-md-3">
      <div
        class="card border-0 shadow-sm text-white"
        style="background: linear-gradient(45deg, #16a34a, #22c55e)"
      >
        <div class="card-body">
          <small>Today</small>
          <h3 class="fw-bold mb-0">PKR {{ rev.today|floatformat:0 }}</h3>
        </div>
      </div>
    </div>

    <!-- YESTERDAY -->
    <div class="col-md-3">
      <div
        class="card border-0 shadow-sm text-white"
        style="background: linear-gradient(45deg, #2563eb, #3b82f6)"
      >
        <div class="card-body">
          <small>Yesterday</small>
          <h3 class="fw-bold mb-0">PKR {{ rev.yesterday|floatformat:0 }}</h3>
        </div>
      </div>
    </div>

    <!-- MONTH -->
    <div class="col-md-3">
      <div
        class="card border-0 shadow-sm text-white"
        style="background: linear-gradient(45deg, #f59e0b, #fbbf24)"
      >
        <div class="card-body">
          <small>This Month</small>
          <h3 class="fw-bold mb-0">PKR {{ rev.this_month|floatformat:0 }}</h3>
        </div>
      </div>
    </div>

    <!-- YEAR -->
    <div class="col-md-3">
      <div
        class="card border-0 shadow-sm text-white"
        style="background: linear-gradient(45deg, #7c3aed, #a78bfa)"
      >
        <div class="card-body">
          <small>This Year</small>
          <h3 class="fw-bold mb-0">PKR {{ rev.this_year|floatformat:0 }}</h3>
        </div>
      </div>
    </div>
  </div>

  <!-- DAILY CHART -->
  <div class="card border-0 shadow-sm p-4 mb-4">
    <div class="d-flex justify-content-between mb-3">
      <h5 class="fw-semibold">Monthly Daily Revenue</h5>
    </div>

    <div id="daily-chart" style="height: 320px"></div>
  </div>

  <!-- MONTHLY CHART -->
  <div class="card border-0 shadow-sm p-4">
    <div class="d-flex justify-content-between mb-3">
      <h5 class="fw-semibold">Monthly Revenue</h5>
    </div>

    <div id="monthly-chart" style="height: 320px"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<script>

  let days = {{ rev.days|safe }};
  let daily = {{ rev.daily|safe }};

  let months = {{ rev.months|safe }};
  let monthly = {{ rev.monthly|safe }};



  // DAILY CHART

  new ApexCharts(
  document.querySelector("#daily-chart"),
  {
  chart:{
  type:"line",
  height:320,
  toolbar:{show:false}
  },

  series:[
  {
  name:"Daily Revenue",
  data:daily
  }
  ],

  stroke:{
  curve:"smooth",
  width:3
  },

  colors:["#16a34a"],

  xaxis:{
  categories:days
  },

  tooltip:{
  y:{
  formatter:function(val){
  return "PKR " + val.toLocaleString();
  }
  }
  }

  }
  ).render();



  // MONTHLY CHART

  new ApexCharts(
  document.querySelector("#monthly-chart"),
  {
  chart:{
  type:"bar",
  height:320,
  toolbar:{show:false}
  },

  series:[
  {
  name:"Monthly Revenue",
  data:monthly
  }
  ],

  colors:["#2563eb"],

  plotOptions:{
  bar:{
  borderRadius:6,
  columnWidth:"45%"
  }
  },

  xaxis:{
  categories:months
  },

  tooltip:{
  y:{
  formatter:function(val){
  return "PKR " + val.toLocaleString();
  }
  }
  }

  }
  ).render();
</script>
